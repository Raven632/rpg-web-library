<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Library</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RPG Lib">
    <link rel="apple-touch-icon" href="/icon.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ ServiceWorker зарегистрирован!', reg.scope))
                .catch(err => console.error('❌ Ошибка ServiceWorker:', err));
            });
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6030;
            --bg-deep: #080608; --bg-mid: #100e12; --bg-card: #13111a;
            --text: #e8dfc8; --text-dim: #7a7060;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg-deep); color:var(--text); font-family:'Crimson Text',Georgia,serif; min-height:100vh; overflow-x:hidden; }
        body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(140,90,20,0.12) 0%, transparent 60%); pointer-events:none; z-index:0; }

        header { 
            position:sticky; top:0; z-index:100; text-align:center; padding:30px 20px 20px; 
            background: linear-gradient(to bottom, rgba(8,6,8,0.95) 40%, rgba(8,6,8,0.7) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .header-ornament { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:10px; }
        .ornament-line { flex:1; max-width:200px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent); }
        .ornament-diamond { width:8px; height:8px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 12px rgba(201,168,76,0.6); }
        h1 { font-family:'Cinzel',serif; font-size:clamp(1.8rem,5vw,3rem); font-weight:900; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold-light); text-shadow:0 0 30px rgba(201,168,76,0.4); margin-bottom: 5px;}
        .subtitle { font-style:italic; font-size:1rem; color:var(--text-dim); letter-spacing:0.1em; }
        
        .controls-zone { position:relative; z-index:1; max-width:1100px; margin: 30px auto 40px; padding:0 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        
        .search-box { flex: 2; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 16px 20px 16px 45px; background: rgba(19, 17, 26, 0.6); border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.05em; color: var(--text); outline: none; transition: all 0.3s; }
        .search-box input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 15px rgba(201,168,76,0.15); }
        .search-box input::placeholder { color: var(--text-dim); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: var(--gold-dim); pointer-events: none; }

        .sort-box { flex: 1; min-width: 180px; padding: 16px 20px; background: rgba(19, 17, 26, 0.6); border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.05em; color: var(--gold-light); outline: none; cursor: pointer; transition: all 0.3s; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="%23c9a84c" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; }
        .sort-box:focus, .sort-box:hover { border-color: var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.15); }
        .sort-box option { background: var(--bg-deep); color: var(--text); }

        .upload-btn { flex: 1; min-width: 180px; padding:16px; background:rgba(201,168,76,0.08); border:1px dashed rgba(201,168,76,0.4); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Cinzel',serif; font-size:0.8rem; letter-spacing:0.1em; color:var(--gold-dim); text-transform:uppercase; transition:all 0.3s ease; }
        .upload-btn:hover { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.7); color:var(--gold); box-shadow: 0 0 15px rgba(201,168,76,0.1); }
        .upload-btn.drag-over { background:rgba(201,168,76,0.2); border-color:var(--gold); color:var(--gold-light); }
        .upload-btn svg { width:18px; height:18px; fill:currentColor; flex-shrink:0; }
        #file-input { display:none; }

        .progress-wrap { display:none; width: 100%; margin-top:15px; background:rgba(0,0,0,0.6); border:1px solid rgba(201,168,76,0.3); border-radius:6px; overflow:hidden; }
        .progress-bar { height:6px; background:linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light)); background-size: 200% 200%; animation: shimmer 2s infinite linear; width:0%; transition:width 0.3s ease; }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .progress-text { padding:12px; font-family:'Cinzel',serif; font-size:0.75rem; letter-spacing:0.1em; color:var(--gold-light); text-align:center; }

        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); z-index:9999; padding:14px 24px; background:rgba(20,18,26,0.95); border:1px solid rgba(201,168,76,0.3); border-radius:6px; font-family:'Cinzel',serif; font-size:0.8rem; letter-spacing:0.1em; color:var(--text); transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; opacity:0; max-width:90vw; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
        .toast.success { border-color:rgba(80,200,80,0.6); color:#a0f0a0; box-shadow: 0 0 20px rgba(80,200,80,0.1); }
        .toast.error   { border-color:rgba(220,60,60,0.6); color:#f09090; box-shadow: 0 0 20px rgba(220,60,60,0.1); }

        .library { position:relative; z-index:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:28px; max-width:1400px; margin:0 auto; padding:0 20px 80px; }

        .game-card { position:relative; background:var(--bg-card); border:1px solid rgba(201,168,76,0.15); border-radius: 4px; cursor:pointer; text-decoration:none; color:inherit; display:block; transition:all 0.4s ease; overflow:hidden; animation:fadeInUp 0.6s ease both; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .game-card::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at center, rgba(201,168,76,0.15) 0%, transparent 70%); opacity:0; transition:opacity 0.4s; z-index:1; pointer-events:none; }
        
        .game-card:hover { transform:translateY(-8px); border-color:rgba(201,168,76,0.6); box-shadow:0 15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(201,168,76,0.2); }
        .game-card:hover::before { opacity:1; }
        
        .card-corner-tl { position:absolute; top:0; left:0; width:20px; height:20px; border-top:2px solid var(--gold-dim); border-left:2px solid var(--gold-dim); transition:all 0.3s; z-index:2; border-top-left-radius: 4px;}
        .card-corner-br { position:absolute; bottom:0; right:0; width:20px; height:20px; border-bottom:2px solid var(--gold-dim); border-right:2px solid var(--gold-dim); transition:all 0.3s; z-index:2; border-bottom-right-radius: 4px;}
        .game-card:hover .card-corner-tl, .game-card:hover .card-corner-br { border-color:var(--gold); width:35px; height:35px; }

        .card-cover { width:100%; aspect-ratio:16/10; overflow:hidden; position:relative; background:#0f0d15; }
        .card-cover img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s; filter:brightness(0.7) saturate(0.8); }
        .game-card:hover .card-cover img { transform:scale(1.08); filter:brightness(1.05) saturate(1.2); }
        
        .card-rating { position:absolute; top:10px; left:10px; z-index:10; display:flex; gap:2px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:12px; border:1px solid rgba(201,168,76,0.2); backdrop-filter:blur(4px); opacity: 0; transition: opacity 0.3s; }
        .game-card:hover .card-rating, .card-rating.has-rating { opacity: 1; }
        .card-rating .star { color: rgba(255,255,255,0.2); font-size: 16px; cursor:pointer; transition: 0.2s; line-height: 1;}
        .card-rating .star:hover { transform: scale(1.3); }
        .card-rating .star.active { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        .cover-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f0d15 0%,#1a1525 50%,#0f0d15 100%); gap:8px; }
        .cover-placeholder .rune { font-family:'Cinzel',serif; font-size:2.5rem; color:var(--gold-dim); opacity:0.5; transition:all 0.4s; }
        .cover-placeholder .folder-name { font-family:'Cinzel',serif; font-size:0.9rem; font-weight:700; color:var(--gold-dim); letter-spacing:0.1em; text-transform:uppercase; transition:color 0.4s; text-align:center; padding:0 12px; }
        .game-card:hover .cover-placeholder .rune { opacity:1; color:var(--gold); transform: scale(1.1);}
        .game-card:hover .cover-placeholder .folder-name { color:var(--gold-light); }
        .card-cover-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(19,17,26,1) 0%, transparent 60%); z-index:1; pointer-events: none;}

        .card-delete { position:absolute; top:12px; right:12px; z-index:10; width:32px; height:32px; background:rgba(20,10,10,0.8); border:1px solid rgba(220,60,60,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.3s; cursor:pointer; backdrop-filter: blur(4px);}
        .game-card:hover .card-delete { opacity:1; transform: rotate(90deg); }
        .card-delete:hover { background:rgba(220,50,50,0.9); transform: rotate(90deg) scale(1.1) !important; box-shadow: 0 0 10px rgba(220,50,50,0.5);}
        .card-delete svg { width:16px; height:16px; fill:white; }

        .card-info { padding:10px 20px 24px; position:relative; z-index:1; }
        .card-number { font-family:'Cinzel',serif; font-size:0.65rem; color:var(--gold-dim); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px; display: flex; align-items: center; justify-content: space-between; gap: 6px;}
        .card-number::before { content: ''; width: 6px; height: 6px; background: var(--gold-dim); border-radius: 50%; display: inline-block; margin-right: auto;}
        .game-card:hover .card-number { color: var(--gold); }
        .game-card:hover .card-number::before { background: var(--gold-light); box-shadow: 0 0 8px var(--gold-light); }
        
        .card-title { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700; color:var(--text); letter-spacing:0.02em; line-height:1.3; transition:color 0.3s; min-height:2.6em; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .game-card:hover .card-title { color:var(--gold-light); }
        
        .card-launch { margin-top: 15px; display:inline-flex; align-items:center; gap:8px; font-size:0.75rem; color:var(--text-dim); font-family:'Cinzel',serif; letter-spacing:0.15em; text-transform:uppercase; transition:all 0.3s; padding: 6px 12px; border: 1px solid transparent; border-radius: 4px;}
        .game-card:hover .card-launch { color:var(--bg-deep); background: var(--gold); font-weight: 700; box-shadow: 0 4px 15px rgba(201,168,76,0.3);}
        .launch-arrow { display:inline-block; transition:transform 0.3s; }
        .game-card:hover .launch-arrow { transform:translateX(4px); }

        .loading { position:relative; z-index:1; text-align:center; padding:80px 20px; font-family:'Cinzel',serif; color:var(--text-dim); letter-spacing:0.2em; font-size:0.85rem; }
        .loading-dots span { display:inline-block; animation:blink 1.4s infinite both; font-size:1.2rem; color:var(--gold-dim); }
        .loading-dots span:nth-child(2) { animation-delay:0.2s; }
        .loading-dots span:nth-child(3) { animation-delay:0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-dim); font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.1em; }
        
        .library-info { position:relative; z-index:1; text-align:center; font-family:'Cinzel',serif; font-size:0.75rem; color:var(--text-dim); letter-spacing:0.2em; padding-bottom:20px; }
        footer { position:relative; z-index:1; text-align:center; padding:25px; border-top:1px solid rgba(201,168,76,0.1); background: rgba(0,0,0,0.3); font-size:0.75rem; color:var(--text-dim); letter-spacing:0.1em; }

        /* ========================================================= */
        /* --- СТИЛИ ВСПЛЫВАЮЩЕГО ОКНА (ИДЕАЛЬНЫЙ DESKTOP UI) --- */
        /* ========================================================= */
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        /* ⚡ ФИКС 1: Окно теперь может быть широким (до 1400px), занимая 92% ширины экрана! */
        .modal-content { background: var(--bg-card); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; max-width: 1400px; width: 92vw; max-height: 90vh; display: flex; flex-direction: column; position: relative; transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 40px rgba(201,168,76,0.1); overflow: hidden; margin: 0 auto; }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }
        
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; color: var(--text-dim); cursor: pointer; line-height: 1; transition: color 0.2s; z-index: 100; font-family: sans-serif; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .modal-close:hover { color: var(--gold-light); }
        
        /* ⚡ ФИКС 2: Отключаем перенос (flex-wrap: nowrap), чтобы картинка и текст всегда стояли в 2 ровные колонки */
        .modal-header { display: flex; flex-wrap: nowrap; gap: 40px; padding: 40px; background: linear-gradient(to bottom right, rgba(201,168,76,0.05), transparent); overflow-y: auto; flex: 1; }
        
        /* ⚡ ФИКС 3: Умная обложка (Steam-style). Не обрезается и парит при скролле текста */
        .modal-cover-wrapper { width: 40%; min-width: 320px; max-width: 550px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(201,168,76,0.2); 
            background: #0f0d15; 
            position: sticky; /* Магия: картинка прилипает к верху при прокрутке */
            top: 0; 
            align-self: flex-start; /* Убираем жесткое растягивание */
            flex-shrink: 0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        
        #modal-cover { 
            width: 100%; 
            height: auto; /* Высота подстраивается под пропорции */
            max-height: 75vh; /* Не дает картинке вылезти за пределы экрана */
            object-fit: contain; /* ⚡ Картинка ВСЕГДА помещается целиком, без обрезки! */
            display: block; 
        }
        
        /* ⚡ ФИКС 4: Текст забирает все оставшиеся 60% ширины и имеет жесткую относительную позицию для кнопки */
        .modal-info { flex: 1; min-width: 300px; display: flex; flex-direction: column; position: relative; }
        
        #modal-number { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold-dim); letter-spacing: 0.2em; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 8px;}
        #modal-number::before { content: ''; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--gold);}
        #modal-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--text); line-height: 1.25; margin-bottom: 25px; text-shadow: 0 0 20px rgba(201,168,76,0.2); padding-right: 40px; }
        
        .modal-meta { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; font-family: 'Cinzel', serif; font-size: 0.9rem; color: var(--text-dim); letter-spacing: 0.05em; }
        .modal-meta b { color: var(--gold-dim); font-weight: normal; margin-right: 5px; }
        
        .modal-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; max-height: 130px; overflow-y: auto; padding-right: 10px; align-content: flex-start; }
        .modal-tags::-webkit-scrollbar { width: 4px; }
        .modal-tags::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .modal-tags::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
        .modal-tags .tag { padding: 6px 14px; font-size: 0.75rem; border-color: rgba(201,168,76,0.3); background: rgba(20,18,26,0.8); }
        
        .modal-description { font-family: 'Crimson Text', serif; font-size: 1.05rem; line-height: 1.7; color: var(--text-dim); white-space: pre-wrap; padding-right: 20px; border-left: 2px solid rgba(201,168,76,0.3); padding-left: 15px; 
            margin-bottom: 60px; /* ⚡ СОЗДАЕМ БУФЕР: Текст отъедет вверх на высоту кнопки */
        }
        .modal-description::-webkit-scrollbar { width: 6px; }
        .modal-description::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .modal-description::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
        
        /* ⚡ ФИКС 5: Парящая кнопка приклеена к самому низу текстового блока! */
        #modal-play-btn { 
            position: sticky; 
            bottom: 0; /* ⚡ Идеально прилипает ровно к нижнему краю окна прокрутки */
            margin-top: auto; 
            width: 100%; z-index: 10;
            padding: 18px; background: rgba(20, 18, 26, 0.95); border: 1px solid var(--gold); border-radius: 6px; color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; box-shadow: 0 -15px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
        }
        #modal-play-btn:hover { background: var(--gold); color: var(--bg-deep); box-shadow: 0 0 25px rgba(201,168,76,0.6); transform: translateY(-2px); }
       
        /* ========================================================= */
        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
        /* ========================================================= */
        @media (max-width: 700px) { 
            html, body { max-width: 100vw; overflow-x: hidden; }
            .search-box, .sort-box, .upload-btn { min-width: 100%; }
            .controls-zone { gap: 10px; margin-bottom: 20px; }

            .modal-overlay { padding: 10px; align-items: center; justify-content: center; } 
            .modal-content { width: 100%; max-width: calc(100vw - 20px); max-height: 90vh; border-radius: 12px; margin: 0; }
            .modal-header { padding: 15px; gap: 15px; display: flex; flex-direction: column; flex-wrap: nowrap; } 
            
            /* ⚡ ФИКС 3: Умная обложка (Steam-style). Не обрезается и парит при скролле текста */
            .modal-cover-wrapper { width: 100%; min-width: 0 !important; max-width: none; max-height: 220px; align-self: center; position: relative; display: flex; align-items: center; justify-content: center; }
        
            #modal-cover { width: 100%; height: auto; /* Высота подстраивается под пропорции */max-height: 75vh; /* Не дает картинке вылезти за пределы экрана */object-fit: contain; /* ⚡ Картинка ВСЕГДА помещается целиком, без обрезки! */display: block; }
            
            .modal-info { width: 100%; min-width: 0 !important; }
            
            #modal-title { font-size: 1.3rem; margin-bottom: 12px; padding-right: 25px; word-break: break-word; } 
            .modal-description { font-size: 0.95rem; padding-left: 10px; padding-right: 5px; 
                margin-bottom: 60px; /* ⚡ Такой же буфер для мобилок */
                border-left-width: 1px; 
            }
            #modal-play-btn { font-size: 1rem; padding: 14px; position: sticky; bottom: 0; width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line"></div>
    </div>
    <h1>RPG Library</h1>
    <p class="subtitle">Ваша личная коллекция приключений</p>
</header>

<div class="controls-zone">
    <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Поиск по названию или тегам (например: RPG)...">
    </div>

    <select id="tag-filter" class="sort-box">
        <option value="all">Все жанры</option>
    </select>

    <select id="sort-select" class="sort-box">
        <option value="newest">Новые поступления</option>
        <option value="recent">Недавно запущенные</option>
        <option value="rating">По оценке (Сначала лучшие)</option>
        <option value="name">По алфавиту</option>
    </select>
    
    <div class="upload-btn" id="upload-btn">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        Добавить игру
    </div>
    <input type="file" id="file-input" accept=".zip,.7z,.rar">
    
    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-text" id="progress-text">Распаковка магии...</div>
    </div>
</div>

<div id="status" class="loading">
    <div>Открытие архивов</div>
    <div class="loading-dots"><span>·</span><span>·</span><span>·</span></div>
</div>

<div class="library" id="library"></div>
<div class="library-info" id="library-info"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="login-modal" style="background: rgba(0,0,0,0.95);">
    <div class="modal-content" style="max-width: 400px; padding: 40px; text-align: center; margin: auto;">
        <h2 style="font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 20px;">Вход в библиотеку</h2>
        <input type="password" id="login-password" placeholder="Введите пароль..." style="width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(20,18,26,0.9); color: var(--text); border: 1px solid var(--gold-dim); border-radius: 4px; font-family: 'Cinzel', serif; font-size: 1rem; outline: none; text-align: center;">
        <button id="login-btn" style="width: 100%; padding: 15px; background: var(--gold-dim); color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; font-size: 1.1rem; transition: background 0.3s;">Войти</button>
        <div id="login-error" style="color: #f44; margin-top: 15px; font-size: 0.9rem; display: none;">Неверный пароль</div>
    </div>
</div>

<div class="modal-overlay" id="game-modal">
    <div class="modal-content">
        <div class="modal-close" id="modal-close">×</div>
        <div class="modal-header">
            <div id="modal-cover-container" class="modal-cover-wrapper">
                <img id="modal-cover" src="" alt="Cover">
                <div id="modal-cover-placeholder" class="cover-placeholder" style="display:none;">
                    <span class="rune" id="modal-placeholder-rune"></span>
                    <span class="folder-name" id="modal-placeholder-name"></span>
                </div>
            </div>
            <div class="modal-info">
                <div class="modal-number" id="modal-number"></div>
                
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 25px;">
                    <h2 id="modal-title" style="margin-bottom:0;"></h2>
                    <button id="modal-edit-btn" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.5rem; transition:color 0.2s;" title="Редактировать метаданные">⚙️</button>
                </div>

                <div id="modal-edit-form" style="display:none; margin-bottom:25px; background:rgba(0,0,0,0.4); padding:15px; border:1px solid rgba(201,168,76,0.3); border-radius:6px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);">
                    <input type="text" id="edit-title-input" placeholder="Название игры" style="width:100%; padding:10px; margin-bottom:10px; background:rgba(20,18,26,0.9); color:var(--text); border:1px solid var(--gold-dim); border-radius:4px; font-family:'Cinzel',serif; font-size:1rem; outline:none;">
                    
                    <input type="text" id="edit-rj-input" placeholder="RJ-код (например: RJ123456) — Оставьте пустым, если не нужно" style="width:100%; padding:10px; margin-bottom:15px; background:rgba(20,18,26,0.9); color:var(--text); border:1px solid var(--gold-dim); border-radius:4px; font-family:'Cinzel',serif; outline:none;">
                    
                    <div style="display:flex; gap:10px;">
                        <button id="edit-save-btn" style="flex:1; padding:10px; background:var(--gold-dim); color:#000; border:none; border-radius:4px; cursor:pointer; font-family:'Cinzel',serif; font-weight:bold; transition:background 0.3s;">💾 Сохранить</button>
                        <button id="edit-cancel-btn" style="padding:10px 15px; background:none; color:var(--text-dim); border:1px solid var(--text-dim); border-radius:4px; cursor:pointer; font-family:'Cinzel',serif; transition:all 0.3s;">Отмена</button>
                    </div>
                    <div id="edit-status" style="font-size:0.8rem; color:var(--gold-light); margin-top:12px; display:none; text-align:center; animation: blink 1.5s infinite;">Поиск данных на DLsite... (ожидание ~15 сек)</div>
                </div>
                
                <div class="modal-meta">
                    <span id="modal-added"></span>
                    <span id="modal-played"></span>
                </div>
                <div class="modal-tags" id="modal-tags"></div>
                <div class="modal-description" id="modal-description"></div>
                <button class="modal-play-btn" id="modal-play-btn">Играть <span class="launch-arrow">→</span></button>
            </div>
        </div>
    </div>
</div>

<footer>RPG Library · Home Server</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
const ROMAN = ['Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ','Ⅺ','Ⅻ'];
const API = ''; 
const socket = io();

socket.on('upload-status', function(data) {
    var progressWrap = document.getElementById('progress-wrap');
    if (progressWrap.style.display === 'block') {
        document.getElementById('progress-text').textContent = data.message;
    }
});

socket.on('scrape-success', function(data) {
    showToast(data.message, 'success');
    loadGames();
});

let allGames = [];
let currentSort = 'newest';

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    setTimeout(function() { t.classList.add('show'); }, 10);
    setTimeout(function() { t.classList.remove('show'); }, 4000);
}

function populateTagFilter(games) {
    const tagSelect = document.getElementById('tag-filter');
    const tagCounts = {};
    
    games.forEach(g => {
        if (g.tags && g.tags.length > 0) {
            g.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
        }
    });

    const sortedTags = Object.keys(tagCounts).sort((a, b) => a.localeCompare(b));
    tagSelect.innerHTML = '<option value="all">Все жанры</option>';
    sortedTags.forEach(tag => {
        const opt = document.createElement('option');
        opt.value = tag; opt.textContent = `${tag} (${tagCounts[tag]})`;
        tagSelect.appendChild(opt);
    });
}

async function loadGames() {
    try {
        var res = await fetch(API + '/api/games?_t=' + Date.now(), { cache: 'no-store' });
        
        // ⚡ ЕСЛИ СЕРВЕР ТРЕБУЕТ ПАРОЛЬ:
        if (res.status === 401) {
            document.getElementById('login-modal').classList.add('active');
            document.getElementById('status').style.display = 'none';
            return;
        }

        if (!res.ok) throw new Error();
        let rawGames = await res.json();
        
        rawGames.forEach(g => {
            if (g.tags && g.tags.length > 0) {
                let cleanedTags = g.tags.map(t => t.replace(/\s*\(\d+\)$/, '').trim());
                g.tags = [...new Set(cleanedTags)]; 
            }
        });
        
        allGames = rawGames;
        populateTagFilter(allGames);
        renderGames(allGames);
    } catch(e) {
        document.getElementById('status').innerHTML = '<div style="color:#e08080;font-family:Cinzel,serif;font-size:0.9rem;letter-spacing:0.1em;">⚠ Связь с сервером потеряна</div>';
    }
}

// ⚡ ЛОГИКА АВТОРИЗАЦИИ
document.getElementById('login-btn').addEventListener('click', async () => {
    const pwd = document.getElementById('login-password').value;
    try {
        const res = await fetch(API + '/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('login-modal').classList.remove('active');
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('status').style.display = 'block'; // Показываем загрузку
            loadGames(); // Загружаем игры
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    } catch(e) {
        document.getElementById('login-error').textContent = 'Ошибка связи с сервером';
        document.getElementById('login-error').style.display = 'block';
    }
});

document.getElementById('search-input').addEventListener('input', function() { renderGames(allGames); });
document.getElementById('sort-select').addEventListener('change', function(e) { currentSort = e.target.value; renderGames(allGames); });
document.getElementById('tag-filter').addEventListener('change', function() { renderGames(allGames); });

function renderGames(games) {
    document.getElementById('status').style.display = 'none';
    var lib = document.getElementById('library');
    lib.innerHTML = '';

    var query = document.getElementById('search-input').value.toLowerCase();
    var selectedTag = document.getElementById('tag-filter').value;

    var filtered = games.filter(function(g) {
        var matchTitle = g.title.toLowerCase().includes(query) || g.id.toLowerCase().includes(query);
        var matchTags = g.tags && g.tags.some(t => t.toLowerCase().includes(query));
        var passesSearch = matchTitle || matchTags;
        var passesTag = true;
        if (selectedTag !== 'all') passesTag = g.tags && g.tags.includes(selectedTag);
        return passesSearch && passesTag;
    });

    if (currentSort === 'newest') filtered.sort((a,b) => b.addedAt - a.addedAt);
    if (currentSort === 'recent') filtered.sort((a,b) => b.lastPlayed - a.lastPlayed);
    if (currentSort === 'rating') filtered.sort((a,b) => b.rating - a.rating);
    if (currentSort === 'name')   filtered.sort((a,b) => a.title.localeCompare(b.title));
    
    if (!filtered.length) {
        lib.innerHTML = '<div class="empty-state">По вашему запросу ничего не найдено...</div>';
        if(allGames.length === 0) lib.innerHTML = '<div class="empty-state">Библиотека пуста. Время добавить первую игру!</div>';
        document.getElementById('library-info').textContent = '';
        return;
    }

    filtered.forEach(function(game, i) {
        var card = document.createElement('div');
        card.className = 'game-card';
        card.style.animationDelay = (i * 0.05) + 's';
        var roman = ROMAN[i % ROMAN.length] || (i + 1).toString();
        
        let starsHtml = `<div class="card-rating ${game.rating > 0 ? 'has-rating' : ''}">`;
        for (let s = 1; s <= 5; s++) starsHtml += `<span class="star ${s <= game.rating ? 'active' : ''}" data-val="${s}">★</span>`;
        starsHtml += `</div>`;
        
        card.innerHTML =
            '<div class="card-corner-tl"></div>' +
            '<div class="card-delete" data-id="' + game.id + '" title="Сжечь игру">' +
                '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>' +
            '</div>' +
            '<div class="card-cover">' +
                starsHtml + 
                (game.cover
                    ? '<img src="' + game.cover + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" alt="">' +
                      '<div class="cover-placeholder" style="display:none"><span class="rune">' + roman + '</span><span class="folder-name">' + game.id + '</span></div>'
                    : '<div class="cover-placeholder"><span class="rune">' + roman + '</span><span class="folder-name">' + game.id + '</span></div>'
                ) +
                '<div class="card-cover-overlay"></div>' +
            '</div>' +
            '<div class="card-info">' +
                '<div class="card-number"><span>Том ' + String(game.number).padStart(2,'0') + '</span></div>' +
                '<div class="card-title">' + game.title + '</div>' +
                '<div class="card-launch">Подробнее <span class="launch-arrow">→</span></div>' +
            '</div>' +
            '<div class="card-corner-br"></div>';

        var stars = card.querySelectorAll('.star');
        stars.forEach(function(star) {
            star.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                var val = parseInt(this.getAttribute('data-val'));
                game.rating = val;
                card.querySelector('.card-rating').classList.add('has-rating');
                stars.forEach(s => {
                    if (parseInt(s.getAttribute('data-val')) <= val) s.classList.add('active');
                    else s.classList.remove('active');
                });
                fetch(API + '/api/games/' + encodeURIComponent(game.id) + '/meta', {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ rating: val })
                });
            });
        });

        card.querySelector('.card-delete').addEventListener('click', async function(e) {
            e.preventDefault(); e.stopPropagation();
            if (!confirm('Сжечь том "' + game.title + '"?\nЭто заклинание необратимо!')) return;
            try {
                var r = await fetch(API + '/api/games/' + encodeURIComponent(game.id), { method: 'DELETE'});
                var d = await r.json();
                if (d.success) { showToast('Том обратился в пепел', 'success'); loadGames(); }
                else showToast('Ошибка: ' + d.error, 'error');
            } catch(err) { showToast('Магия дала сбой', 'error'); }
        });

        card.addEventListener('click', function(e) {
            if (e.target.closest('.card-delete') || e.target.closest('.card-rating')) return;
            
            document.getElementById('modal-title').textContent = game.title;
            document.getElementById('modal-number').textContent = 'Том ' + String(game.number).padStart(2,'0');
            
            const coverEl = document.getElementById('modal-cover');
            const placeholder = document.getElementById('modal-cover-placeholder');
            if (game.cover) {
                coverEl.src = game.cover; coverEl.style.display = 'block'; placeholder.style.display = 'none';
            } else {
                coverEl.style.display = 'none'; placeholder.style.display = 'flex';
                document.getElementById('modal-placeholder-rune').textContent = ROMAN[i % ROMAN.length] || (i + 1);
                document.getElementById('modal-placeholder-name').textContent = game.id;
            }

            const formatDate = (ms) => ms ? new Date(ms).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Никогда';
            document.getElementById('modal-added').innerHTML = '<b>Свиток получен:</b> ' + formatDate(game.addedAt);
            document.getElementById('modal-played').innerHTML = '<b>Последний ритуал:</b> ' + formatDate(game.lastPlayed);

            const tagsDiv = document.getElementById('modal-tags');
            tagsDiv.innerHTML = '';
            if (game.tags && game.tags.length > 0) {
                game.tags.forEach(t => {
                    const span = document.createElement('span'); span.className = 'tag'; span.textContent = t; tagsDiv.appendChild(span);
                });
            } else {
                tagsDiv.innerHTML = '<span class="tag" style="opacity:0.5; border-color:transparent;">Теги не расшифрованы</span>';
            }

            const descDiv = document.getElementById('modal-description');
            if (game.description) {
                descDiv.textContent = game.description; descDiv.style.display = 'block';
            } else {
                descDiv.style.display = 'none';
            }

            // ⚡ ИСПРАВЛЕННЫЙ ЗАПУСК ИГРЫ (Safe Navigation + Keepalive)
            document.getElementById('modal-play-btn').onclick = async function(e) {
                e.preventDefault();
                game.lastPlayed = Date.now();
                
                const btn = e.currentTarget;
                const originalText = btn.innerHTML;
                btn.style.opacity = '0.7';
                btn.style.pointerEvents = 'none';
                btn.innerHTML = 'Запуск... <span class="launch-arrow">→</span>';

                try {
                    // Используем await, чтобы дать запросу стартовать
                    await fetch(API + '/api/games/' + encodeURIComponent(game.id) + '/meta', {
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ lastPlayed: game.lastPlayed }),
                        // ⚡ МАГИЯ: Заставляет браузер завершить запрос даже при смене URL
                        keepalive: true 
                    });
                } catch(err) {
                    console.warn('[Meta] Не удалось обновить статус', err);
                } finally {
                    // Перенаправляем на игру
                    window.location.href = game.url;
                    
                    // Восстанавливаем кнопку на случай возврата "Назад" в браузере
                    setTimeout(() => { 
                        btn.innerHTML = originalText; 
                        btn.style.opacity = '1'; 
                        btn.style.pointerEvents = 'auto';
                    }, 1000);
                }
            };

            const editForm = document.getElementById('modal-edit-form');
            const titleDisplay = document.getElementById('modal-title');
            const saveBtn = document.getElementById('edit-save-btn');
            const statusEl = document.getElementById('edit-status');
            
            editForm.style.display = 'none'; titleDisplay.style.display = 'block';
            document.getElementById('edit-title-input').value = game.title;
            document.getElementById('edit-rj-input').value = ''; 

            document.getElementById('modal-edit-btn').onclick = function() { titleDisplay.style.display = 'none'; editForm.style.display = 'block'; };
            document.getElementById('edit-cancel-btn').onclick = function() { titleDisplay.style.display = 'block'; editForm.style.display = 'none'; };

            saveBtn.onclick = async function() {
                const newTitle = document.getElementById('edit-title-input').value.trim();
                const newRj = document.getElementById('edit-rj-input').value.trim();
                
                statusEl.style.display = 'block'; statusEl.textContent = newRj ? 'Связь с серверами DLsite... (ожидание ~15 сек)' : 'Сохранение...';
                saveBtn.disabled = true; saveBtn.style.opacity = '0.5';

                try {
                    const res = await fetch(`${API}/api/games/${encodeURIComponent(game.id)}/edit`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json'}, body: JSON.stringify({ title: newTitle, rjCode: newRj })
                    });
                    const data = await res.json();
                    if (data.success) {
                        if (data.warning) showToast(data.warning, 'error'); else showToast('Том успешно переписан!', 'success');
                        game.title = data.title; game.cover = data.cover; game.tags = data.tags; game.description = data.description;
                        
                        titleDisplay.textContent = game.title;
                        if (game.cover) { document.getElementById('modal-cover').src = game.cover; document.getElementById('modal-cover').style.display = 'block'; document.getElementById('modal-cover-placeholder').style.display = 'none'; }
                        
                        tagsDiv.innerHTML = '';
                        if (game.tags && game.tags.length > 0) { game.tags.forEach(t => { const span = document.createElement('span'); span.className = 'tag'; span.textContent = t; tagsDiv.appendChild(span); }); }
                        if (game.description) { descDiv.textContent = game.description; descDiv.style.display = 'block'; }

                        titleDisplay.style.display = 'block'; editForm.style.display = 'none';
                        loadGames();
                    } else showToast(data.error, 'error');
                } catch(e) { showToast('Магическая сеть недоступна', 'error'); } 
                finally { saveBtn.disabled = false; saveBtn.style.opacity = '1'; statusEl.style.display = 'none'; }
            };

            document.getElementById('game-modal').classList.add('active');
        });

        lib.appendChild(card);
    });
    
    document.getElementById('library-info').textContent = filtered.length + ' свитков найдено';
}

var uploadBtn = document.getElementById('upload-btn');
var fileInput = document.getElementById('file-input');
var progressWrap = document.getElementById('progress-wrap');
var progressBar = document.getElementById('progress-bar');
var progressText = document.getElementById('progress-text');

uploadBtn.addEventListener('click', function() { fileInput.click(); });
uploadBtn.addEventListener('dragover', function(e) { e.preventDefault(); uploadBtn.classList.add('drag-over'); });
uploadBtn.addEventListener('dragleave', function() { uploadBtn.classList.remove('drag-over'); });
uploadBtn.addEventListener('drop', function(e) { e.preventDefault(); uploadBtn.classList.remove('drag-over'); var file = e.dataTransfer.files[0]; if (file) uploadFile(file); });
fileInput.addEventListener('change', function() { if (fileInput.files[0]) uploadFile(fileInput.files[0]); fileInput.value = ''; });

function uploadFile(file) {
    if (!file.name.toLowerCase().match(/\.(zip|7z|rar)$/)) { showToast('Сервер принимает только архивы ZIP, 7z или RAR!', 'error'); return; }
    var formData = new FormData(); formData.append('game', file);
    var xhr = new XMLHttpRequest();
    progressWrap.style.display = 'block'; progressBar.style.width = '0%'; progressText.textContent = 'Передача ' + file.name + '...';
    uploadBtn.style.pointerEvents = 'none'; uploadBtn.style.opacity = '0.5';

    xhr.upload.addEventListener('progress', function(e) {
        if (e.lengthComputable) {
            progressBar.style.width = Math.round(e.loaded / e.total * 90) + '%';
            progressText.textContent = 'Передача маны: ' + (e.loaded / 1024 / 1024).toFixed(1) + ' / ' + (e.total / 1024 / 1024).toFixed(1) + ' MB';
        }
    });

    xhr.addEventListener('load', function() {
        progressBar.style.width = '100%';
        try {
            var data = JSON.parse(xhr.responseText);
            if (data.success) { progressText.textContent = '✓ ' + data.message; showToast(data.message, 'success'); setTimeout(function() { progressWrap.style.display = 'none'; loadGames(); }, 2000); } 
            else { progressText.textContent = '✗ ' + data.error; showToast(data.error, 'error'); }
        } catch(e) { progressText.textContent = '✗ Сервер не отвечает'; showToast('Ошибка сервера', 'error'); }
        uploadBtn.style.pointerEvents = ''; uploadBtn.style.opacity = '';
    });

    xhr.addEventListener('error', function() { progressText.textContent = '✗ Ритуал прерван'; showToast('Связь разорвана', 'error'); uploadBtn.style.pointerEvents = ''; uploadBtn.style.opacity = ''; });
    xhr.open('POST', API + '/api/upload');
    xhr.send(formData);
}

document.getElementById('modal-close').addEventListener('click', () => document.getElementById('game-modal').classList.remove('active'));
document.getElementById('game-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('game-modal')) document.getElementById('game-modal').classList.remove('active');
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.getElementById('game-modal').classList.remove('active');
});

loadGames();

// ==========================================
// ⚡ УМНОЕ ОБНОВЛЕНИЕ ДАННЫХ (Reactivation)
// ==========================================

// 1. Слушаем возврат на страницу через кнопку "Назад" или свайп (BFCache)
window.addEventListener('pageshow', function(event) {
    // event.persisted означает, что страница была "разморожена" из памяти
    if (event.persisted) {
        console.log('🔄 Возврат из BFCache, обновляем данные...');
        loadGames();
    }
});

// 2. Слушаем возврат в PWA-приложение (если ты сворачивал его в фон)
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        console.log('🔄 Приложение снова активно, обновляем данные...');
        loadGames();
    }
});

</script>
</body>
</html>
